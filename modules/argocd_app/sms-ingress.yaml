apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-ingress
  namespace: sms-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: sms-app.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sms-frontend-service
            port:
              number: 3000
